name: Build Production

on:
  push:
    branches: [production]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  FLUTTER_VERSION: '3.38.6'

jobs:
  validate-production:
    name: Validate Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib/

      - name: Analyze app
        run: flutter analyze --no-fatal-infos

      - name: Validate Supabase schema
        run: |
          test -f supabase/schema.sql
          grep -q "create table if not exists public.users" supabase/schema.sql
          grep -q "create table if not exists public.logs" supabase/schema.sql
          grep -q "create table if not exists public.schedules" supabase/schema.sql
          grep -q "create table if not exists public.community_posts" supabase/schema.sql
          grep -q "alter table public.users enable row level security" supabase/schema.sql
          grep -q "alter table public.logs enable row level security" supabase/schema.sql
          grep -q "create policy users_select_own" supabase/schema.sql
          grep -q "create policy logs_insert_own" supabase/schema.sql
          grep -q "create policy schedules_insert_own" supabase/schema.sql

      - name: Test cloud config
        run: |
          flutter test test/cloud_backend_config_test.dart \
            --dart-define=ENVIRONMENT=production \
            --dart-define=BACKEND_PROVIDER=supabase \
            --dart-define=SUPABASE_URL=https://example.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=ci-placeholder-anon-key

      - name: Run tests
        run: flutter test

  build-android-production:
    name: Build Android (Production)
    runs-on: ubuntu-latest
    environment: production
    needs: validate-production
    env:
      BACKEND_PROVIDER: ${{ vars.BACKEND_PROVIDER || 'none' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_AUTH_REDIRECT_URL: ${{ vars.SUPABASE_AUTH_REDIRECT_URL || 'com.levio.app://login-callback/' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Build App Bundle (Production)
        run: |
          flutter build appbundle --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ github.run_number }} \
            --dart-define=ENVIRONMENT=production \
            "--dart-define=BACKEND_PROVIDER=$BACKEND_PROVIDER" \
            "--dart-define=SUPABASE_URL=$SUPABASE_URL" \
            "--dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" \
            "--dart-define=SUPABASE_AUTH_REDIRECT_URL=$SUPABASE_AUTH_REDIRECT_URL"

      - name: Build APK (Production)
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ github.run_number }} \
            --dart-define=ENVIRONMENT=production \
            "--dart-define=BACKEND_PROVIDER=$BACKEND_PROVIDER" \
            "--dart-define=SUPABASE_URL=$SUPABASE_URL" \
            "--dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" \
            "--dart-define=SUPABASE_AUTH_REDIRECT_URL=$SUPABASE_AUTH_REDIRECT_URL"

      - name: Upload App Bundle
        uses: actions/upload-artifact@v6
        with:
          name: production-aab-${{ steps.version.outputs.version }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: production-apk-${{ steps.version.outputs.version }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

  build-ios-production:
    name: Build iOS (Production)
    runs-on: macos-latest
    environment: production
    needs: validate-production
    env:
      BACKEND_PROVIDER: ${{ vars.BACKEND_PROVIDER || 'none' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_AUTH_REDIRECT_URL: ${{ vars.SUPABASE_AUTH_REDIRECT_URL || 'com.levio.app://login-callback/' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Install Apple certificate and provisioning profile
        if: secrets.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate and provisioning profile from secrets
          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build iOS (Production)
        run: |
          flutter build ios --release --no-codesign \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ github.run_number }} \
            --dart-define=ENVIRONMENT=production \
            "--dart-define=BACKEND_PROVIDER=$BACKEND_PROVIDER" \
            "--dart-define=SUPABASE_URL=$SUPABASE_URL" \
            "--dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" \
            "--dart-define=SUPABASE_AUTH_REDIRECT_URL=$SUPABASE_AUTH_REDIRECT_URL"

      - name: Generate ExportOptions.plist
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        run: |
          cat > ios/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>uploadSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.levio.app</key>
              <string>${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}</string>
            </dict>
          </dict>
          </plist>
          PLIST

      - name: Build IPA
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        run: |
          flutter build ipa --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ github.run_number }} \
            --dart-define=ENVIRONMENT=production \
            "--dart-define=BACKEND_PROVIDER=$BACKEND_PROVIDER" \
            "--dart-define=SUPABASE_URL=$SUPABASE_URL" \
            "--dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" \
            "--dart-define=SUPABASE_AUTH_REDIRECT_URL=$SUPABASE_AUTH_REDIRECT_URL" \
            --export-options-plist=ios/ExportOptions.plist
        continue-on-error: true

      - name: Upload iOS build
        uses: actions/upload-artifact@v6
        with:
          name: production-ios-${{ steps.version.outputs.version }}
          path: |
            build/ios/ipa/*.ipa
            build/ios/archive/*.xcarchive
          retention-days: 90
        continue-on-error: true

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android-production, build-ios-production]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: production-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.apk
            *.aab
            *.ipa
          generate_release_notes: true
          draft: true
